version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ts3auth
      POSTGRES_USER:     ts3auth
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ts3auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:            production
      COOKIE_SECURE:       ${COOKIE_SECURE:-false}
      PORT:                3000
      SESSION_SECRET:      ${SESSION_SECRET}
      PGHOST:              db
      PGPORT:              5432
      PGDATABASE:          ts3auth
      PGUSER:              ts3auth
      PGPASSWORD:          ${PGPASSWORD}
      EVE_CLIENT_ID:       ${EVE_CLIENT_ID}
      EVE_CLIENT_SECRET:   ${EVE_CLIENT_SECRET}
      EVE_CALLBACK_URL:    ${EVE_CALLBACK_URL}
      TS3_HOST:            ${TS3_HOST}
      TS3_QUERY_PORT:      ${TS3_QUERY_PORT:-10011}
      TS3_SERVER_PORT:     ${TS3_SERVER_PORT:-9987}
      TS3_USERNAME:        ${TS3_USERNAME}
      TS3_PASSWORD:        ${TS3_PASSWORD}
      TS3_BOT_NICKNAME:    ${TS3_BOT_NICKNAME:-AuthBot}
      ADMIN_CHARACTER_IDS: ${ADMIN_CHARACTER_IDS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
